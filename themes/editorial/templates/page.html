<section class="article-stage">
  <article class="article-card article-card--page">
    <div class="article-card__topline">
      <div class="eyebrow">{{entry_label}}</div>
      <span class="article-card__stamp">Page</span>
    </div>
    <h1>{{entry_title}}</h1>
    <p class="article-lead">{{entry_summary}}</p>
    <div class="markdown-content">
      {{body_html}}
    </div>
  </article>
</section>
