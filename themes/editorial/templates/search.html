<section class="search-stage" data-search-root data-search-index="{{search_index_href}}">
  <section class="search-banner">
    <div class="eyebrow">Search Desk</div>
    <h1>搜索内容</h1>
    <p class="hero-text">输入标题、标签或正文关键词，像翻目录一样找到你想读的内容。</p>
    <form class="search-bar" action="index.html" method="get" data-search-form>
      <input class="search-bar__input" type="search" name="q" placeholder="例如：Markdown、部署、主题" data-search-input />
      <button class="search-bar__submit" type="submit">搜索</button>
      <button class="search-bar__clear" type="button" data-search-clear hidden>清空</button>
    </form>
  </section>
  <section class="search-stream">
    <div class="search-stream__head">
      <div>
        <div class="eyebrow">Search Results</div>
        <h2 data-search-heading>全部内容</h2>
      </div>
      <p class="search-status" data-search-status>正在准备搜索索引…</p>
    </div>
    <div class="search-results" data-search-results></div>
  </section>
</section>
