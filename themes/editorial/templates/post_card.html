<article class="post-card">
  {{card_cover_html}}
  <div class="post-card__body">
    <div class="post-card__meta">
      <div class="eyebrow">{{card_date}}</div>
      <span class="post-card__marker">Feature</span>
    </div>
    <h2><a href="{{card_href}}">{{card_title}}</a></h2>
    <p>{{card_summary}}</p>
    {{card_tags_html}}
    <a class="post-card__link" href="{{card_href}}">阅读全文</a>
  </div>
</article>
