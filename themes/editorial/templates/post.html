<section class="article-stage article-stage--reading">
  <div class="post-layout">
    <div class="post-main">
      <article class="article-card article-card--post">
        <div class="article-card__topline">
          <div class="eyebrow">Reading Room</div>
          <span class="article-card__stamp">Article</span>
        </div>
        <div class="markdown-content">
          {{body_html}}
        </div>
      </article>
      {{comments_html}}
    </div>
    <aside class="post-sidebar">
      {{post_outline_html}}
      {{related_posts_html}}
    </aside>
  </div>
</section>
