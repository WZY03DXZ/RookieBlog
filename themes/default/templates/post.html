<div class="post-layout">
  <div class="post-main">
    <article class="article-card">
      <div class="eyebrow">{{entry_label}}</div>
      <h1>{{entry_title}}</h1>
      <p class="article-lead">{{entry_summary}}</p>
      <div class="meta-row">
        <span>{{entry_date}}</span>
        <span>{{author_name}}</span>
      </div>
      {{cover_html}}
      <div class="markdown-content">
        {{body_html}}
      </div>
      {{tags_html}}
    </article>
    {{comments_html}}
  </div>
  <aside class="post-sidebar">
    {{post_outline_html}}
    {{related_posts_html}}
  </aside>
</div>
