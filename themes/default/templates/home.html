<section class="hero-card">
  <div class="hero-copy">
    <div class="eyebrow">轻量静态博客</div>
    <h1>{{site_title}}</h1>
    <p class="hero-lead">{{site_tagline}}</p>
    <p class="hero-text">{{site_description}}</p>
  </div>
  <div class="hero-note">
    <p>可从 Markdown / TXT / HTML / DOCX 导入</p>
    <p>PDF 支持通过本机 `pdftotext` 可选导入</p>
    <p>不需要图床</p>
    <p>主题可通过 `themes/` 目录扩展</p>
  </div>
</section>
<section class="section-heading">
  <div>
    <div class="eyebrow">最新内容</div>
    <h2>文章列表</h2>
  </div>
</section>
<section class="post-grid">
  {{post_cards_html}}
</section>
